name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine pytest

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Build package
        run: python -m build

      - name: Validate and test built wheel
        run: |
          twine check dist/*
          python -m venv /tmp/sessionpt-release-test
          /tmp/sessionpt-release-test/bin/pip install dist/*.whl pytest
          /tmp/sessionpt-release-test/bin/pytest

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
